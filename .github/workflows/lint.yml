name: Linting and style checking

on: [push, pull_request]

jobs:
  stylua:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: JohnnyMorganz/stylua-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: v2.1.0
          # CLI arguments
          args: --color always --respect-ignores --check .
